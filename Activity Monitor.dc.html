<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = {
    theme: 'dark', page: 'git', metric: 'commits', bucket: 'month',
    vw: 1360, drill: [], repos: null, from: null, to: null,
    trackers: ['bugs','tasks','stories'], drawer: null,
    repoOpen: false, trkOpen: false, tooltip: null,
    groupBy: 'repo', zoneEditOpen: false,
    zones: [
      {name:'IP', dirs:['ip']},
      {name:'Blocks', dirs:['block']},
      {name:'Verification', dirs:['verif','tests','tb','uvm']},
      {name:'Software', dirs:['src','drivers','rtos','hal','app']},
      {name:'Infra', dirs:['constraints','ld','arch','migrations','cmd','internal','pkg']},
      {name:'Docs', dirs:['docs','content','themes']}
    ]
  };

  // ---------- lifecycle ----------
  componentDidMount(){
    const measure = () => this.setState({ vw: window.innerWidth });
    measure();
    this._onResize = measure;
    window.addEventListener('resize', this._onResize);
    if (this.state.repos === null) {
      this.setState({
        repos: this.REPOS.map(r=>r.name),
        from: this.ALLMONTHS[0].key,
        to: this.ALLMONTHS[this.ALLMONTHS.length-1].key
      });
    }
    document.addEventListener('click', this._closePop = (e)=>{
      if(!e.target.closest || !e.target.closest('[data-pop]')) this.setState({repoOpen:false, trkOpen:false, zoneEditOpen:false});
    });
  }
  componentWillUnmount(){ window.removeEventListener('resize', this._onResize); document.removeEventListener('click', this._closePop); }

  // ---------- prng / hash ----------
  hash(str){ let h=2166136261; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
  rng(seed){ let t = seed>>>0; return ()=>{ t=(t+0x6D2B79F5)|0; let x=Math.imul(t^(t>>>15),1|t); x=(x+Math.imul(x^(x>>>7),61|x))^x; return ((x^(x>>>14))>>>0)/4294967296; }; }

  // ---------- static config ----------
  get REPOS(){ return [
    {name:'uart', default_branch:'main'},
    {name:'firmware', default_branch:'main'},
    {name:'bootloader', default_branch:'master'},
    {name:'web-console', default_branch:'main'},
    {name:'telemetry-service', default_branch:'main'},
    {name:'docs-portal', default_branch:'main'}
  ]; }
  get PALETTE(){ return ['#5b8cff','#12b3a6','#e0a34e','#b07cf0','#ec6f9e','#4cc0e0']; }
  get AUTHORS(){ return [['Priya Nadkarni',1.0],['Marek Kowalski',0.83],['Diego Fuentes',0.72],['Lena Fischer',0.6],['Sam Okafor',0.49],['Yuki Tanaka',0.4],['Tom Byrne',0.31],['Aisha Rahman',0.22]]; }
  get TRACKERS(){ return [
    {id:'bugs', tuleap_tracker_id:101, name:'Bugs', w:0.46, statuses:['New','Confirmed','In Progress','Fixed','Closed']},
    {id:'tasks', tuleap_tracker_id:102, name:'Tasks', w:0.31, statuses:['Todo','Doing','Review','Done']},
    {id:'stories', tuleap_tracker_id:103, name:'User Stories', w:0.23, statuses:['Backlog','Ready','In Progress','In Review','Accepted']}
  ]; }
  get LAYOUTS(){ return {
    'uart': {
      rtl: {
        ip: {
          uart_core: ['uart_top.v','uart_regs.v','ctrl_fsm.v','apb_if.v'],
          baud_gen: ['baud_div.v','clk_sync.v','frac_acc.v'],

        },
        block: {
          rx_path: ['rx_shift.v','parity_chk.v','oversample.v','glitch_filt.v'],

        }
      },
      verif: { uvm: ['uart_env.sv','uart_seq.sv','scoreboard.sv','coverage.sv'], tb: ['tb_top.sv','clk_rst.sv'] },
      constraints: ['uart.sdc','pins.xdc'],
      docs: ['protocol.md','registers.md']
    },
    'firmware': {
      rtl: {
        ip: { spi_master: ['spi_top.v','spi_shift.v','cs_ctrl.v'], i2c_master: ['i2c_top.v','i2c_sm.v'], pwm: ['pwm_gen.v','deadband.v'] },
        block: { clk_rst: ['pll.v','rst_sync.v','clk_mux.v'], irq: ['irq_ctrl.v','vector_tbl.v'] }
      },
      src: { drivers: { spi: ['spi.c','spi_dma.c'], i2c: ['i2c.c','i2c_isr.c'], adc: ['adc.c'], gpio: ['gpio.c'] }, rtos: ['sched.c','mutex.c','queue.c','timer.c'], hal: ['clock.c','flash.c','power.c'], app: ['main.c','state.c','telemetry.c','config.c'] },

      ld: ['link.ld','memory.ld'],
      tests: ['test_crc.c','test_crypto.c']
    },
    'web-console': {
      src: { components: { charts: ['Treemap.tsx','Line.tsx','Heatmap.tsx'], layout: ['TopBar.tsx','Drawer.tsx','Tabs.tsx'], table: ['Table.tsx'] }, pages: ['Git.tsx','Trackers.tsx'], api: ['client.ts','types.ts'], store: ['filters.ts','cache.ts'] },

      pkg: ['git.go','tuleap.go'],
      migrations: ['0001_init.sql','0002_links.sql'],
      tests: ['ingest_test.go','store_test.go']
    },
    'docs-portal': {
      content: { guides: ['setup.md','architecture.md','ci.md'], reference: ['api.md','cli.md'] },
      src: ['build.js','nav.js'],
      themes: ['default.css'],
      static: ['logo.svg']
    }
  }; }

  // ---------- buckets (18 months) ----------
  get ALLMONTHS(){ if(this._m) return this._m; const arr=[]; const start=new Date(Date.UTC(2025,0,1)); const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; for(let i=0;i<18;i++){ const d=new Date(Date.UTC(2025,i,1)); arr.push({key:d.toISOString().slice(0,10), label:M[d.getUTCMonth()], year:d.getUTCFullYear(), month:d.getUTCMonth(), t:d.getTime()}); } this._m=arr; return arr; }
  get ALLWEEKS(){ if(this._w) return this._w; const arr=[]; const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; let d=new Date(Date.UTC(2025,0,6)); for(let i=0;i<78;i++){ const dd=new Date(d.getTime()); arr.push({key:dd.toISOString().slice(0,10), label:M[dd.getUTCMonth()]+' '+dd.getUTCDate(), month:dd.getUTCMonth(), t:dd.getTime()}); d=new Date(d.getTime()+7*864e5);} this._w=arr; return arr; }
  bucketsAll(){ return this.state.bucket==='month'? this.ALLMONTHS : this.ALLWEEKS; }
  buckets(){ const all=this.bucketsAll(); const f=this.state.from, t=this.state.to; if(!f||!t) return all; return all.filter(b=> b.key>=f && b.key<=t ); }

  // ---------- tree ----------
  buildRepoTree(repoName){
    const rng=this.rng(this.hash(repoName+'|tree'));
    const dir=(name,path,children)=>({name,path,is_leaf:false,children,commits:children.reduce((s,c)=>s+c.commits,0),churn:children.reduce((s,c)=>s+c.churn,0),files:children.reduce((s,c)=>s+c.files,0)});
    const build=(name,path,spec)=>{
      if(Array.isArray(spec)){
        const ch=spec.map(f=>{ const c=Math.round((0.15+Math.pow(rng(),1.7))*(28+rng()*300)); const churn=Math.round(c*(16+rng()*170)); const files=Math.max(1,Math.round(c*(0.5+rng()*0.9))); return {name:f,path:path+'/'+f,is_leaf:true,commits:c,churn,files}; });
        return dir(name,path,ch);
      }
      const ch=Object.keys(spec).map(k=>build(k,path+'/'+k,spec[k]));
      return dir(name,path,ch);
    };
    const layout=this.LAYOUTS[repoName];
    const kids=Object.keys(layout).map(k=>build(k,repoName+'/'+k,layout[k]));
    return dir(repoName,repoName,kids);
  }
  get TREES(){ if(this._t) return this._t; this._t={}; this.REPOS.forEach(r=>this._t[r.name]=this.buildRepoTree(r.name)); return this._t; }

  rootNode(){
    const sel = this.state.repos || this.REPOS.map(r=>r.name);
    const kids = this.REPOS.filter(r=>sel.includes(r.name)).map(r=>this.TREES[r.name]);
    return {name:'root',path:'root',is_leaf:false,children:kids,commits:kids.reduce((s,c)=>s+c.commits,0),churn:kids.reduce((s,c)=>s+c.churn,0),files:kids.reduce((s,c)=>s+c.files,0)};
  }
  // ---- zone grouping (configurable top level) ----
  classifyZone(path){ const segs=path.split('/'); for(const z of this.state.zones){ if((z.dirs||[]).some(d=>d&&segs.includes(d))) return z.name; } return 'Other'; }
  makeTreeFromLeaves(rootName, leaves){
    const root={name:rootName, path:'root/'+rootName, is_leaf:false, children:[], _m:{}};
    for(const lf of leaves){ const segs=lf.path.split('/'); let cur=root;
      for(let i=0;i<segs.length;i++){ const last=i===segs.length-1; const nm=segs[i];
        if(last){ cur.children.push({name:nm, path:lf.path, is_leaf:true, commits:lf.commits, churn:lf.churn, files:lf.files}); }
        else { let nx=cur._m[nm]; if(!nx){ nx={name:nm, path:cur.path+'/'+nm, is_leaf:false, children:[], _m:{}}; cur._m[nm]=nx; cur.children.push(nx); } cur=nx; }
      }
    }
    const fin=(n)=>{ if(n.is_leaf) return; delete n._m; n.children.forEach(fin); n.commits=n.children.reduce((s,c)=>s+c.commits,0); n.churn=n.children.reduce((s,c)=>s+c.churn,0); n.files=n.children.reduce((s,c)=>s+c.files,0); };
    fin(root); return root;
  }
  zoneRoot(){
    const sel = this.state.repos || this.REPOS.map(r=>r.name);
    const leaves=[]; this.REPOS.filter(r=>sel.includes(r.name)).forEach(r=> leaves.push(...this.collectLeaves(this.TREES[r.name])));
    const groups={}; leaves.forEach(lf=>{ const z=this.classifyZone(lf.path); (groups[z]=groups[z]||[]).push(lf); });
    const order=this.state.zones.map(z=>z.name).concat(['Other']);
    const kids=order.filter(nm=>groups[nm]&&groups[nm].length).map(nm=> this.makeTreeFromLeaves(nm, groups[nm]));
    return {name:'root',path:'root',is_leaf:false,children:kids,commits:kids.reduce((s,c)=>s+c.commits,0),churn:kids.reduce((s,c)=>s+c.churn,0),files:kids.reduce((s,c)=>s+c.files,0)};
  }
  currentRoot(){ return this.state.groupBy==='zone'? this.zoneRoot() : this.rootNode(); }
  rootIndexOf(name){ if(this.state.groupBy==='zone'){ const names=this.state.zones.map(z=>z.name).concat(['Other']); const i=names.indexOf(name); return i<0?0:i; } return this.repoIndex(name); }
  rootLabel(){ return this.state.groupBy==='zone'?'zones':'repos'; }
  updateZone(i, patch){ const zs=this.state.zones.map((z,j)=> j===i? {...z,...patch}:z); this.set({zones:zs, drill:[]}); }
  addZone(){ this.set({zones:[...this.state.zones, {name:'New zone', dirs:[]}], drill:[]}); }
  removeZone(i){ this.set({zones:this.state.zones.filter((_,j)=>j!==i), drill:[]}); }
  currentNode(){ let node=this.currentRoot(); for(const seg of this.state.drill){ if(!node.children) break; const nx=node.children.find(c=>c.name===seg); if(!nx) break; node=nx; } return node; }

  // ---------- scoped derived series ----------
  contributorsFor(node){
    const m=this.state.metric; const total=node[m]||1;
    const rng=this.rng(this.hash(node.path+'|'+m+'|contrib'));
    let arr=this.AUTHORS.map(([name,w])=>({author:name, w:Math.max(0.02, w*(0.55+rng()*1.0))}));
    const sw=arr.reduce((s,a)=>s+a.w,0);
    arr=arr.map(a=>({author:a.author, value:Math.max(1,Math.round(total*a.w/sw))}));
    arr.sort((a,b)=>b.value-a.value);
    return arr;
  }
  trendFor(node){
    const m=this.state.metric; const bs=this.buckets(); const n=bs.length||1;
    const total=node[m]||1;
    const seed=this.hash(node.path+'|'+m+'|'+this.state.bucket);
    const rng=this.rng(seed); const ph=seed%7;
    let w=[]; for(let i=0;i<n;i++){ const t=n>1?i/(n-1):0.5; const ramp=0.45+0.85*t; const season=1+0.28*Math.sin(t*Math.PI*2.6+ph)+0.14*Math.sin(t*Math.PI*7+ph); const noise=0.6+rng()*0.85; w.push(Math.max(0.04, ramp*season*noise)); }
    const sw=w.reduce((a,b)=>a+b,0)||1;
    return bs.map((b,i)=>({bucket:b.key, label:b.label, value:Math.max(0,Math.round(total*w[i]/sw))}));
  }

  // ---------- tracker series ----------
  trkFrac(){ const sel=this.state.trackers; return this.TRACKERS.filter(t=>sel.includes(t.id)).reduce((s,t)=>s+t.w,0); }
  backlogSeries(){
    const bs=this.buckets(); const frac=this.trkFrac(); if(bs.length===0||frac===0) return [];
    const rng=this.rng(this.hash('backlog|'+this.state.bucket));
    const base=this.state.bucket==='month'?20:6;
    let open=this.state.bucket==='month'?16:16; const raw=[];
    for(let i=0;i<bs.length;i++){ const t=bs.length>1?i/(bs.length-1):0; const taper=1-0.55*t; let opened=Math.round(base*(0.7+rng()*0.9)*(1+0.28*Math.sin(t*7))); let closed=Math.round(opened*(0.5+rng()*0.42+0.28*t)); open=Math.max(0,open+opened-closed); raw.push({opened,closed,open}); }
    const maxOpen=Math.max(...raw.map(r=>r.open),1); const target=92; const k=target/maxOpen;
    return bs.map((b,i)=>({bucket:b.key,label:b.label, opened:Math.max(0,Math.round(raw[i].opened*frac)), closed:Math.max(0,Math.round(raw[i].closed*frac)), open_count:Math.max(0,Math.round(raw[i].open*k*frac))}));
  }
  cycleRows(){
    const frac=this.trkFrac()/ this.TRACKERS.reduce((s,t)=>s+t.w,0);
    const names=['Priya Nadkarni','Marek Kowalski','Diego Fuentes','Lena Fischer','Sam Okafor','Yuki Tanaka','Tom Byrne','Aisha Rahman','Ravi Menon'];
    return names.map(nm=>{ const rng=this.rng(this.hash(nm+'|cycle')); const close=Math.round(3+rng()*21); const age=Math.round(close*(0.8+rng()*1.6)+4); const closed=Math.round((10+rng()*52)*frac); const open=Math.round((2+rng()*15)*frac); return {assignee:nm, median_days_to_close:close, median_open_age_days:age, open_count:open, closed_count:closed}; })
      .sort((a,b)=>b.median_open_age_days-a.median_open_age_days);
  }

  // ---------- cross-links data ----------
  get ARTIFACTS(){ return [
    {id:'A1', tracker:'Bugs', ref:'bug #4821', title:'UART RX overrun under sustained 921600 baud', status:'In Progress', assignee:'Priya Nadkarni', opened:'2026-05-14', age:12,
      commits:['C1','C2','C5'] },
    {id:'A2', tracker:'User Stories', ref:'story #2103', title:'Batch ingest links commits to Tuleap artifacts', status:'In Review', assignee:'Diego Fuentes', opened:'2026-04-02', age:31,
      commits:['C3','C4'] },
    {id:'A3', tracker:'Tasks', ref:'task #7740', title:'Add DMA double-buffer to reduce ISR load', status:'Doing', assignee:'Marek Kowalski', opened:'2026-05-28', age:6,
      commits:['C6'] },
    {id:'A4', tracker:'Bugs', ref:'bug #4790', title:'Bootloader CRC mismatch on RISC-V target', status:'Confirmed', assignee:'Lena Fischer', opened:'2026-05-02', age:24,
      commits:['C7','C8'] }
  ]; }
  get COMMITS(){ return {
    C1:{sha:'a1c9f2e', repo:'uart', author:'Priya Nadkarni', when:'2026-05-20', msg:'uart: guard RX ring against overrun', artifacts:['A1']},
    C2:{sha:'7d3b0aa', repo:'uart', author:'Priya Nadkarni', when:'2026-05-22', msg:'uart: add overrun counter to stats', artifacts:['A1']},
    C3:{sha:'e0f4b71', repo:'telemetry-service', author:'Diego Fuentes', when:'2026-04-11', msg:'ingest: parse Tuleap cross-reference syntax', artifacts:['A2']},
    C4:{sha:'2b8c910', repo:'telemetry-service', author:'Diego Fuentes', when:'2026-04-18', msg:'store: persist commit<->artifact link table', artifacts:['A2']},
    C5:{sha:'ccd1e34', repo:'uart', author:'Sam Okafor', when:'2026-05-25', msg:'uart: fifo watermark tuning for high baud', artifacts:['A1']},
    C6:{sha:'9a77f02', repo:'firmware', author:'Marek Kowalski', when:'2026-05-30', msg:'drivers/dma: introduce double-buffer path', artifacts:['A3']},
    C7:{sha:'44be5d1', repo:'bootloader', author:'Lena Fischer', when:'2026-05-06', msg:'crc: fix polynomial init for riscv build', artifacts:['A4']},
    C8:{sha:'f31029c', repo:'bootloader', author:'Lena Fischer', when:'2026-05-09', msg:'arch/riscv: align vector table to 64B', artifacts:['A4']}
  }; }

  // ---------- color helpers ----------
  hexToRgb(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  lum(hex){ const [r,g,b]=this.hexToRgb(hex).map(v=>{v/=255; return v<=0.03928? v/12.92 : Math.pow((v+0.055)/1.055,2.4);}); return 0.2126*r+0.7152*g+0.0722*b; }
  shade(hex, amt){ // amt -1..1
    let [r,g,b]=this.hexToRgb(hex);
    if(amt>=0){ r=r+(255-r)*amt; g=g+(255-g)*amt; b=b+(255-b)*amt; }
    else { r=r*(1+amt); g=g*(1+amt); b=b*(1+amt); }
    return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
  }
  repoIndex(name){ const i=this.REPOS.findIndex(r=>r.name===name); return i<0?0:i; }

  // ---------- number fmt ----------
  fmt(n){ n=Math.round(n); const a=Math.abs(n); if(a>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if(a>=1e4) return (n/1e3).toFixed(0)+'k'; if(a>=1e3) return (n/1e3).toFixed(1)+'k'; return ''+n; }
  fmtFull(n){ return Math.round(n).toLocaleString('en-US'); }
  metricLabel(){ return {commits:'commits', churn:'lines churned', files:'files touched'}[this.state.metric]; }
  metricShort(){ return this.state.metric; }

  // ---------- treemap layout (squarified) ----------
  squarify(data, X, Y, W, H){
    data=data.filter(d=>d.value>0).slice().sort((a,b)=>b.value-a.value);
    const nodes=[]; if(data.length===0) return nodes;
    const total=data.reduce((s,d)=>s+d.value,0)||1; const scale=(W*H)/total;
    const items=data.map(d=>({d, a:d.value*scale}));
    let x=X,y=Y,w=W,h=H;

  // ---------- code frequency (add / del) ----------

      const per=this.TRACKERS.map(t=>{ const open=Math.max(1,Math.round(size*0.55*(0.35+rng())*t.w*3)); const closed=Math.round(open*(2.2+rng()*3)); return {id:t.id, name:t.name, open, closed}; }).filter(p=>sel.includes(p.id));

            h('text',{x:cx, y:y(r.open)-7, textAnchor:'middle', fontSize:11.5, fontWeight:600, fill:'var(--text)', fontFamily:'IBM Plex Mono'}, r.open),

    {ref:'task #7712', trk:'tasks', title:'Migrate store queries to prepared statements', status:'Todo', assignee:'Ravi Menon', age:73},
    {ref:'task #7698', trk:'tasks', title:'Add flash-monitor retry backoff', status:'Review', assignee:'Tom Byrne', age:19},
    {ref:'story #2088', trk:'stories', title:'Web console dark-mode design tokens', status:'Ready', assignee:'Aisha Rahman', age:96},
    {ref:'story #2071', trk:'stories', title:'Per-repo access scoping for the console', status:'Backlog', assignee:'Diego Fuentes', age:131},
    {ref:'bug #4520', trk:'bugs', title:'Bootloader hangs on brown-out reset', status:'Confirmed', assignee:'Lena Fischer', age:118},
    {ref:'task #7655', trk:'tasks', title:'CI: cache firmware toolchain between runs', status:'Doing', assignee:'Marek Kowalski', age:9},
    {ref:'bug #4744', trk:'bugs', title:'UART parity errors at 3 Mbaud', status:'New', assignee:'Priya Nadkarni', age:38},
    {ref:'story #2095', trk:'stories', title:'Artifact ↔ commit graph view', status:'In Progress', assignee:'Sam Okafor', age:27}
  ]; }
  ageBand(age){ if(age<=7) return {label:'≤ 7d', color:'var(--green)'}; if(age<=30) return {label:'8–30d', color:'var(--accent)'}; if(age<=90) return {label:'31–90d', color:'#e0a34e'}; return {label:'> 90d', color:'var(--red)'}; }
  openTickets(){ return this.OPEN_TICKETS.filter(t=>this.state.trackers.includes(t.trk)).sort((a,b)=>b.age-a.age); }

  openAgePanel(ctx){ const h=ctx.h; const tix=this.openTickets();
    if(tix.length===0) return this.emptyState(ctx,'No open tickets in this selection');
    const bands=[{k:'≤ 7d',lo:0,hi:7,color:'var(--green)'},{k:'8–30d',lo:8,hi:30,color:'var(--accent)'},{k:'31–90d',lo:31,hi:90,color:'#e0a34e'},{k:'> 90d',lo:91,hi:1e9,color:'var(--red)'}];
    const counts=bands.map(b=>({...b, n:tix.filter(t=>t.age>=b.lo&&t.age<=b.hi).length}));
    const total=tix.length; const maxAge=Math.max(...tix.map(t=>t.age),1);
    const median=(()=>{ const a=tix.map(t=>t.age).sort((x,y)=>x-y); const m=a.length; return m%2? a[(m-1)/2] : Math.round((a[m/2-1]+a[m/2])/2); })();
    const stColor=(s)=>({'In Progress':'var(--accent)','In Review':'#b07cf0','Doing':'#e0a34e','Confirmed':'var(--red)','New':'var(--red)','Ready':'var(--green)','Review':'#b07cf0','Todo':'var(--muted)','Backlog':'var(--muted)'})[s]||'var(--muted)';
    return h('div',null,
      // summary strip
      h('div',{style:{display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))', gap:10, marginBottom:16}},
        h('div',{style:{padding:'12px 14px', background:'var(--panel2)', border:'1px solid var(--border)', borderRadius:12}},
          h('div',{style:{fontSize:11, color:'var(--faint)', textTransform:'uppercase', letterSpacing:0.5, fontWeight:600}}, 'Open'),
          h('div',{style:{fontSize:22, fontWeight:600, fontFamily:"'IBM Plex Mono',monospace", marginTop:3}}, total),
          h('div',{style:{fontSize:11.5, color:'var(--muted)', marginTop:1}}, 'median age '+median+'d')
        ),
        counts.map(c=> h('div',{key:c.k, style:{padding:'12px 14px', background:'var(--panel2)', border:'1px solid var(--border)', borderRadius:12}},
          h('div',{style:{display:'flex', alignItems:'center', gap:6, fontSize:11, color:'var(--muted)', fontWeight:600}}, h('span',{style:{width:8,height:8,borderRadius:2,background:c.color}}), c.k),
          h('div',{style:{fontSize:22, fontWeight:600, fontFamily:"'IBM Plex Mono',monospace", marginTop:3}}, c.n),
          h('div',{style:{height:4, borderRadius:2, background:'var(--track)', marginTop:8, overflow:'hidden'}}, h('div',{style:{height:'100%', width:(total?c.n/total*100:0)+'%', background:c.color, borderRadius:2}}))
        ))
      ),
      // histogram
      this.ageHistogram(ctx, tix, median),
      // list
      h('div',{style:{display:'flex', flexDirection:'column', gap:1}},
        tix.map((t,i)=>{ const band=this.ageBand(t.age); const clickable=!!t.link;
          return h('div',{key:i, onClick:()=> clickable && this.set({drawer:{type:'artifact', id:t.link}}), style:{display:'grid', gridTemplateColumns: ctx.narrow?'70px 1fr 96px':'82px 1fr 130px 150px 96px', alignItems:'center', gap:12, padding:'11px 12px', borderRadius:10, cursor:clickable?'pointer':'default'}, onMouseEnter:e=>e.currentTarget.style.background='var(--hover)', onMouseLeave:e=>e.currentTarget.style.background='transparent'},
            h('span',{style:{fontFamily:"'IBM Plex Mono',monospace", fontSize:11.5, color:clickable?'var(--accent)':'var(--muted)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}, t.ref),
            h('div',{style:{minWidth:0}}, h('div',{style:{fontSize:13, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}, t.title), ctx.narrow? h('div',{style:{fontSize:11.5, color:'var(--faint)', marginTop:2}}, t.assignee):null),
            !ctx.narrow? h('span',{style:{display:'inline-flex', alignItems:'center', gap:6, fontSize:11.5, color:stColor(t.status), fontWeight:600}}, h('span',{style:{width:6,height:6,borderRadius:'50%',background:stColor(t.status)}}), t.status):null,
            !ctx.narrow? h('span',{style:{fontSize:12, color:'var(--muted)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}, t.assignee):null,
            h('div',{style:{display:'flex', alignItems:'center', gap:8}},
              h('div',{style:{flex:1, height:7, background:'var(--track)', borderRadius:4, overflow:'hidden'}}, h('div',{style:{height:'100%', width:(t.age/maxAge*100)+'%', background:band.color, borderRadius:4}})),
              h('span',{style:{fontSize:12, fontFamily:"'IBM Plex Mono',monospace", color:'var(--muted)', width:34, textAlign:'right'}}, t.age+'d')
            )
          );
        })
      )
    );
  }

  ageHistogram(ctx, tix, median){ const h=ctx.h;
    const bin=15; const maxAge=Math.max(...tix.map(t=>t.age),1); const nb=Math.max(1,Math.ceil((maxAge+1)/bin));
    const bins=[]; for(let i=0;i<nb;i++) bins.push({lo:i*bin, hi:i*bin+bin-1, n:0});
    tix.forEach(t=>{ const i=Math.min(nb-1,Math.floor(t.age/bin)); bins[i].n++; });
    const W=Math.max(320, ctx.pageW-(ctx.narrow?32:40)); const H=214; const P={l:30,r:12,t:16,b:36};
    const iw=W-P.l-P.r, ih=H-P.t-P.b; const span=nb*bin;
    const maxN=Math.max(...bins.map(b=>b.n),1); const steps=Math.min(maxN,4); const stepv=Math.ceil(maxN/steps); const yMax=stepv*steps;
    const bw=iw/nb; const gap=Math.min(6,bw*0.16);
    const x=i=>P.l+i*bw; const y=v=>P.t+ih-(v/yMax)*ih;
    const yt=[]; for(let v=0; v<=yMax; v+=stepv) yt.push(v);
    const medX=P.l+(Math.min(median,span)/span)*iw;
    return h('div',{style:{margin:'2px 0 18px'}},
      h('div',{style:{fontSize:11.5, color:'var(--muted)', marginBottom:6, fontFamily:"'IBM Plex Mono',monospace"}}, 'distribution of open-ticket age · 15-day bins'),
      h('div',{style:{width:'100%', overflowX:'auto'}}, h('svg',{width:W, height:H, style:{display:'block', maxWidth:'100%'}, onMouseLeave:()=>this.hideTip()},
        yt.map((v,i)=> h('g',{key:'y'+i}, h('line',{x1:P.l, x2:W-P.r, y1:y(v), y2:y(v), stroke:'var(--grid)'}), h('text',{x:P.l-7, y:y(v)+4, textAnchor:'end', fontSize:10.5, fill:'var(--faint)', fontFamily:'IBM Plex Mono'}, v))),
        bins.map((b,i)=>{ const band=this.ageBand(b.lo+bin/2); const bh=b.n/yMax*ih; return h('g',{key:'b'+i, onMouseMove:(e)=>this.showTip(e,{title:b.lo+'–'+(i===nb-1?maxAge:b.hi)+' days', rows:[['tickets', b.n],['share', (b.n/tix.length*100).toFixed(0)+'%']], accent:band.color}), onMouseLeave:()=>this.hideTip()},
          h('rect',{x:x(i), y:P.t, width:bw, height:ih, fill:'transparent'}),
          b.n>0? h('rect',{x:x(i)+gap/2, y:y(b.n), width:Math.max(1,bw-gap), height:Math.max(0,bh), rx:4, fill:band.color, fillOpacity:0.9}) : null,
          b.n>0? h('text',{x:x(i)+bw/2, y:y(b.n)-6, textAnchor:'middle', fontSize:11, fontWeight:600, fill:'var(--text)', fontFamily:'IBM Plex Mono'}, b.n) : null,
          h('text',{x:x(i), y:H-12, textAnchor:'middle', fontSize:10, fill:'var(--faint)', fontFamily:'IBM Plex Mono'}, b.lo)
        ); }),
        h('text',{x:x(nb), y:H-12, textAnchor:'middle', fontSize:10, fill:'var(--faint)', fontFamily:'IBM Plex Mono'}, span),
        // median marker
        h('line',{x1:medX, x2:medX, y1:P.t-2, y2:P.t+ih, stroke:'var(--text)', strokeWidth:1.4, strokeDasharray:'3 3', opacity:0.55}),
        h('g',null, h('rect',{x:medX-30, y:P.t-13, width:60, height:15, rx:4, fill:'var(--text)', opacity:0.9}), h('text',{x:medX, y:P.t-2, textAnchor:'middle', fontSize:10, fontWeight:600, fill:'var(--panel)', fontFamily:'IBM Plex Mono'}, 'med '+median+'d'))
      ))
    );
  }

  // ---------- drawer (cross-links) ----------
  drawer(ctx){ const h=ctx.h; const d=this.state.drawer; const close=()=>this.set({drawer:null});
    let body;
    if(d.type==='artifact'){ const a=this.ARTIFACTS.find(x=>x.id===d.id); body=this.artifactDrawer(ctx,a); }
    else { const c=this.COMMITS[d.id]; body=this.commitDrawer(ctx,c,d.id); }
    return h('div',{style:{position:'fixed', inset:0, zIndex:60, display:'flex', justifyContent:'flex-end'}},
      h('div',{onClick:close, style:{position:'absolute', inset:0, background:'rgba(0,0,0,0.45)', backdropFilter:'blur(2px)', animation:'dcfade .2s'}}),
      h('div',{style:{position:'relative', width:Math.min(this.state.vw-24, 460), height:'100%', background:'var(--panel)', borderLeft:'1px solid var(--border2)', boxShadow:'-20px 0 50px rgba(0,0,0,0.3)', overflowY:'auto', animation:'dcfade .25s ease'}},
        body
      )
    );
  }
  drawerHead(ctx, kicker, title, close){ const h=ctx.h; return h('div',{style:{padding:'18px 20px', borderBottom:'1px solid var(--border)', position:'sticky', top:0, background:'var(--panel)', zIndex:2}},
    h('div',{style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}},
      h('span',{style:{fontSize:11, textTransform:'uppercase', letterSpacing:0.7, color:'var(--faint)', fontWeight:600, fontFamily:"'IBM Plex Mono',monospace"}}, kicker),
      h('button',{onClick:close, style:{cursor:'pointer', width:30,height:30, borderRadius:8, border:'1px solid var(--border)', background:'var(--panel2)', color:'var(--muted)', display:'grid', placeItems:'center'}}, h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.2},h('path',{d:'M6 6l12 12M18 6L6 18'})))
    ),
    h('div',{style:{fontSize:16, fontWeight:600, lineHeight:1.35}}, title)
  ); }
  metaRow(ctx, items){ const h=ctx.h; return h('div',{style:{display:'flex', flexWrap:'wrap', gap:'6px 18px', padding:'14px 20px', borderBottom:'1px solid var(--border)'}}, items.map(([k,v,c],i)=> h('div',{key:i}, h('div',{style:{fontSize:10.5, color:'var(--faint)', textTransform:'uppercase', letterSpacing:0.4, fontWeight:600}}, k), h('div',{style:{fontSize:13, fontWeight:500, marginTop:2, color:c||'var(--text)', fontFamily: k==='Age'||k==='When'?"'IBM Plex Mono',monospace":'inherit'}}, v)))); }
  linkHeader(ctx, txt){ const h=ctx.h; return h('div',{style:{padding:'16px 20px 8px', fontSize:11, textTransform:'uppercase', letterSpacing:0.6, color:'var(--faint)', fontWeight:600, display:'flex', alignItems:'center', gap:7}}, h('svg',{width:13,height:13,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},h('path',{d:'M9 17H7A5 5 0 017 7h2M15 7h2a5 5 0 010 10h-2M8 12h8'})), txt); }

  artifactDrawer(ctx, a){ const h=ctx.h; const close=()=>this.set({drawer:null});
    return h('div',null,
      this.drawerHead(ctx, a.tracker+' · '+a.ref, a.title, close),
      this.metaRow(ctx, [['Status',a.status,'var(--accent)'],['Assignee',a.assignee],['Opened',a.opened],['Age',a.age+' d']]),
      this.linkHeader(ctx, a.commits.length+' linked commits'),
      h('div',{style:{padding:'0 12px 20px', display:'flex', flexDirection:'column', gap:2}},
        a.commits.map(cid=>{ const c=this.COMMITS[cid]; return h('a',{key:cid, href:'#', onClick:(e)=>{e.preventDefault(); this.set({drawer:{type:'commit', id:cid}});}, style:{display:'flex', gap:12, padding:'11px 12px', borderRadius:10, textDecoration:'none', color:'var(--text)'}, onMouseEnter:e=>e.currentTarget.style.background='var(--hover)', onMouseLeave:e=>e.currentTarget.style.background='transparent'},
          h('span',{style:{fontFamily:"'IBM Plex Mono',monospace", fontSize:12, color:'var(--accent)', fontWeight:500, flexShrink:0}}, c.sha),
          h('div',{style:{flex:1, minWidth:0}},
            h('div',{style:{fontSize:13, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}, c.msg),
            h('div',{style:{fontSize:11.5, color:'var(--faint)', marginTop:2, fontFamily:"'IBM Plex Mono',monospace"}}, c.repo+' · '+c.author+' · '+c.when)
          ),
          h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'var(--faint)',strokeWidth:2, style:{flexShrink:0, marginTop:2}},h('path',{d:'M7 17L17 7M9 7h8v8'}))
        ); })
      )
    );
  }
  commitDrawer(ctx, c, cid){ const h=ctx.h; const close=()=>this.set({drawer:null}); const arts=c.artifacts.map(id=>this.ARTIFACTS.find(a=>a.id===id)).filter(Boolean);
    return h('div',null,
      this.drawerHead(ctx, 'commit · '+c.repo, c.msg, close),
      this.metaRow(ctx, [['SHA',c.sha,'var(--accent)'],['Author',c.author],['When',c.when],['Repo',c.repo]]),
      this.linkHeader(ctx, arts.length+' linked artifacts'),
      h('div',{style:{padding:'0 12px 20px', display:'flex', flexDirection:'column', gap:2}},
        arts.map(a=> h('a',{key:a.id, href:'#', onClick:(e)=>{e.preventDefault(); this.set({drawer:{type:'artifact', id:a.id}});}, style:{display:'flex', gap:12, padding:'11px 12px', borderRadius:10, textDecoration:'none', color:'var(--text)'}, onMouseEnter:e=>e.currentTarget.style.background='var(--hover)', onMouseLeave:e=>e.currentTarget.style.background='transparent'},
          h('span',{style:{fontFamily:"'IBM Plex Mono',monospace", fontSize:12, color:'var(--accent)', fontWeight:500, flexShrink:0}}, a.ref),
          h('div',{style:{flex:1, minWidth:0}},
            h('div',{style:{fontSize:13, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}, a.title),
            h('div',{style:{fontSize:11.5, color:'var(--faint)', marginTop:2}}, a.tracker+' · '+a.status)
          ),
          h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'var(--faint)',strokeWidth:2, style:{flexShrink:0, marginTop:2}},h('path',{d:'M7 17L17 7M9 7h8v8'}))
        ))
      )
    );
  }

  // ---------- tooltip ----------
  showTip(e, content){ this.setState({tooltip:{x:e.clientX, y:e.clientY, ...content}}); }
  hideTip(){ if(this.state.tooltip) this.setState({tooltip:null}); }
  tooltipEl(ctx){ const t=this.state.tooltip; if(!t) return null; const h=ctx.h;
    const flipX = t.x > this.state.vw-190; const flipY = t.y > window.innerHeight-140;
    return h('div',{style:{position:'fixed', left:t.x+(flipX?-14:14), top:t.y+(flipY?-14:14), transform:`translate(${flipX?'-100%':'0'}, ${flipY?'-100%':'0'})`, zIndex:80, pointerEvents:'none', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:10, boxShadow:'var(--shadow)', padding:'9px 11px', minWidth:130, animation:'dcfade .1s'}},
      h('div',{style:{display:'flex', alignItems:'center', gap:7, marginBottom:t.rows.length?7:0, paddingBottom:t.rows.length?7:0, borderBottom:t.rows.length?'1px solid var(--border)':'none'}},
        t.accent? h('span',{style:{width:8,height:8,borderRadius:2,background:t.accent,flexShrink:0}}):null,
        h('span',{style:{fontSize:12, fontWeight:600, fontFamily:"'IBM Plex Mono',monospace", wordBreak:'break-all'}}, t.title)
      ),
      (t.rows||[]).map((r,i)=> h('div',{key:i, style:{display:'flex', justifyContent:'space-between', gap:18, fontSize:11.5, padding:'1.5px 0'}},
        h('span',{style:{color:'var(--muted)'}}, r[0]), h('span',{style:{fontWeight:600, fontFamily:"'IBM Plex Mono',monospace"}}, r[1])
      ))
    );
  }
}
</script>
